<!DOCTYPE html>
<html>
<head>
    <title>🎰 Casino Bingo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<div id="login">
    <h1>🎰 Casino Bingo</h1>
    <input id="nameInput" placeholder="Enter name">
    <button onclick="joinGame()">Join</button>
</div>

<div id="game" style="display:none;">
    <h2>🔴 Number: <span id="calledNumber">--</span></h2>

    <h2>💰 Balance: <span id="balance">1000</span></h2>
    <input type="number" id="bet" value="50">

    <button onclick="checkBingo()">Check BINGO</button>
    <button onclick="restartGame()">Restart</button>

    <h2 id="result"></h2>

    <h2>🎮 Card</h2>
    <div id="bingoCard" class="grid"></div>

    <h2>🏆 Leaderboard</h2>
    <ul id="leaderboard"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
