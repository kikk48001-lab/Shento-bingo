<!DOCTYPE html>
<html lang="en">
<head>

    <title>Ultimate Bingo</title>

</head>
<body>

<h1>🎰 Ultimate Bingo Casino</h1>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
